<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N빵 — 더치페이 정산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #17171a;
    --surface2: #1f1f24;
    --border: #2a2a30;
    --accent: #c8ff57;
    --accent2: #57c8ff;
    --accent3: #ff7057;
    --text: #f0f0f0;
    --muted: #888;
    --card-radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  /* ── HEADER ── */
  header {
    max-width: 560px;
    margin: 0 auto 32px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 {
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: -1.5px;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.5;
  }

  /* ── NAV TABS ── */
  .tabs {
    max-width: 560px;
    margin: 0 auto 24px;
    display: flex;
    gap: 8px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  /* ── PAGES ── */
  .page { display: none; max-width: 560px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── INPUTS ── */
  label {
    display: block;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 14px;
  }
  input:focus { border-color: var(--accent); }

  /* ── MEMBER TAGS ── */
  .member-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 38px;
    margin-bottom: 12px;
  }
  .member-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px 5px 14px;
    font-size: 0.88rem;
    font-weight: 500;
    animation: popIn .2s ease;
  }
  @keyframes popIn {
    from { transform: scale(.7); opacity: 0; }
    to   { transform: scale(1);  opacity: 1; }
  }
  .member-tag button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0;
    transition: color .15s;
  }
  .member-tag button:hover { color: var(--accent3); }

  /* ── ADD ROW ── */
  .add-row {
    display: flex;
    gap: 8px;
  }
  .add-row input { margin-bottom: 0; flex: 1; }

  /* ── EXPENSE LIST ── */
  .expense-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn .25s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(-10px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }
  .expense-item:last-child { border-bottom: none; }
  .exp-who {
    background: var(--accent);
    color: #000;
    font-size: 0.75rem;
    font-weight: 900;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .exp-desc { flex: 1; font-size: 0.9rem; }
  .exp-amt {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--accent2);
    white-space: nowrap;
  }
  .exp-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0 4px;
    transition: color .15s;
  }
  .exp-del:hover { color: var(--accent3); }

  /* ── BUTTONS ── */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: -.3px;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1.5px solid var(--border);
    margin-top: 10px;
  }
  .btn-sm {
    width: auto;
    padding: 10px 18px;
    font-size: 0.88rem;
  }

  /* ── SELECT ── */
  select {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.95rem;
    padding: 12px 14px;
    outline: none;
    margin-bottom: 14px;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  /* ── RESULT CARDS ── */
  .result-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-box .stat-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .stat-box .stat-val {
    font-family: 'DM Mono', monospace;
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--accent);
  }

  /* ── PERSON RESULT ── */
  .person-result {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: popIn .3s ease;
  }
  .person-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    font-weight: 900;
    flex-shrink: 0;
  }
  .person-info { flex: 1; }
  .person-name { font-weight: 700; font-size: 0.95rem; }
  .person-paid {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }
  .person-balance {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    text-align: right;
  }
  .balance-pos { color: #6dff9a; }
  .balance-neg { color: var(--accent3); }
  .balance-zero { color: var(--muted); }

  /* ── TRANSFER LIST ── */
  .transfer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 0.88rem;
    animation: slideIn .25s ease;
  }
  .transfer-item .arrow { color: var(--accent); font-size: 1rem; }
  .t-from { font-weight: 700; }
  .t-to { font-weight: 700; color: var(--accent2); }
  .t-amt {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--accent3);
  }

  /* ── BAR CHART ── */
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 0.85rem;
  }
  .bar-label { width: 64px; text-align: right; font-weight: 500; color: var(--muted); }
  .bar-track {
    flex: 1;
    height: 22px;
    background: var(--surface2);
    border-radius: 6px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: #000;
    white-space: nowrap;
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty .emoji { font-size: 2.5rem; margin-bottom: 10px; }
  .empty p { font-size: 0.9rem; line-height: 1.6; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #000;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 10px 22px;
    border-radius: 30px;
    transition: transform .3s ease;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .hint { font-size: 0.78rem; color: var(--muted); margin-top: -8px; margin-bottom: 14px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>N<span>빵</span></h1>
    <p>더치페이 정산 계산기</p>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="goTab(0)">👥 멤버</button>
  <button class="tab-btn" onclick="goTab(1)">💳 지출</button>
  <button class="tab-btn" onclick="goTab(2)">📊 정산</button>
</div>

<!-- PAGE 0: 멤버 -->
<div class="page active" id="page0">
  <div class="card">
    <div class="card-title">모임 이름</div>
    <input type="text" id="groupName" placeholder="ex) 동아리 MT, 생일파티" />

    <div class="card-title">멤버 추가</div>
    <div class="member-list" id="memberList"></div>
    <div class="add-row">
      <input type="text" id="memberInput" placeholder="이름 입력 후 Enter" onkeydown="if(event.key==='Enter') addMember()" />
      <button class="btn btn-primary btn-sm" onclick="addMember()">추가</button>
    </div>
  </div>
  <button class="btn btn-primary" onclick="goTab(1)">다음 → 지출 입력</button>
</div>

<!-- PAGE 1: 지출 -->
<div class="page" id="page1">
  <div class="card">
    <div class="card-title">지출 추가</div>
    <label>결제한 사람</label>
    <select id="payerSelect"><option value="">멤버를 먼저 추가하세요</option></select>
    <label>항목 이름</label>
    <input type="text" id="expDesc" placeholder="ex) 삼겹살, 택시, 카페" />
    <label>금액 (원)</label>
    <input type="number" id="expAmt" placeholder="0" min="0" onkeydown="if(event.key==='Enter') addExpense()" />
    <button class="btn btn-primary" onclick="addExpense()">+ 지출 추가</button>
  </div>

  <div class="card" id="expenseCard">
    <div class="card-title">지출 목록</div>
    <div id="expenseList"><div class="empty"><div class="emoji">🧾</div><p>아직 지출이 없어요</p></div></div>
  </div>

  <button class="btn btn-primary" onclick="goTab(2)">다음 → 정산 보기</button>
  <button class="btn btn-secondary" onclick="goTab(0)">← 멤버로</button>
</div>

<!-- PAGE 2: 정산 -->
<div class="page" id="page2">
  <div id="resultArea"><div class="empty"><div class="emoji">💸</div><p>멤버와 지출을 입력하면<br>정산 결과가 여기에 나타나요</p></div></div>
  <button class="btn btn-secondary" onclick="goTab(1)" style="margin-top:8px">← 지출로</button>
</div>

<div id="toast"></div>

<script>
  let members = [];
  let expenses = [];
  const COLORS = ['#c8ff57','#57c8ff','#ff7057','#c457ff','#ffb457','#57ffb4','#ff57b4','#57a8ff'];

  function getColor(i) { return COLORS[i % COLORS.length]; }
  function fmt(n) { return n.toLocaleString('ko-KR') + '원'; }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ── TABS ──
  function goTab(n) {
    document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', i===n));
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===n));
    if (n === 2) renderResult();
    if (n === 1) renderPayerSelect();
  }

  // ── MEMBERS ──
  function addMember() {
    const inp = document.getElementById('memberInput');
    const name = inp.value.trim();
    if (!name) return;
    if (members.includes(name)) { toast('이미 있는 이름이에요!'); return; }
    members.push(name);
    inp.value = '';
    renderMembers();
    renderPayerSelect();
    toast(`${name} 추가됨 👋`);
  }

  function removeMember(name) {
    members = members.filter(m => m !== name);
    expenses = expenses.filter(e => e.payer !== name);
    renderMembers();
    renderPayerSelect();
    renderExpenses();
  }

  function renderMembers() {
    const list = document.getElementById('memberList');
    if (!members.length) { list.innerHTML = '<span style="color:var(--muted);font-size:.85rem">멤버를 추가해보세요</span>'; return; }
    list.innerHTML = members.map((m,i) =>
      `<div class="member-tag" style="border-color:${getColor(i)}40">
        <span style="color:${getColor(i)}">${m}</span>
        <button onclick="removeMember('${m}')">×</button>
      </div>`
    ).join('');
  }

  // ── EXPENSES ──
  function renderPayerSelect() {
    const sel = document.getElementById('payerSelect');
    if (!members.length) { sel.innerHTML = '<option value="">멤버를 먼저 추가하세요</option>'; return; }
    sel.innerHTML = members.map(m => `<option value="${m}">${m}</option>`).join('');
  }

  function addExpense() {
    const payer = document.getElementById('payerSelect').value;
    const desc  = document.getElementById('expDesc').value.trim();
    const amt   = parseInt(document.getElementById('expAmt').value);
    if (!payer) { toast('멤버를 먼저 추가하세요!'); return; }
    if (!desc)  { toast('항목 이름을 입력하세요!'); return; }
    if (!amt || amt <= 0) { toast('올바른 금액을 입력하세요!'); return; }
    expenses.push({ payer, desc, amt, id: Date.now() });
    document.getElementById('expDesc').value = '';
    document.getElementById('expAmt').value = '';
    renderExpenses();
    toast(`${desc} +${fmt(amt)} 추가됨 ✅`);
  }

  function removeExpense(id) {
    expenses = expenses.filter(e => e.id !== id);
    renderExpenses();
  }

  function renderExpenses() {
    const el = document.getElementById('expenseList');
    if (!expenses.length) {
      el.innerHTML = '<div class="empty"><div class="emoji">🧾</div><p>아직 지출이 없어요</p></div>';
      return;
    }
    el.innerHTML = expenses.map(e => {
      const ci = members.indexOf(e.payer);
      return `<div class="expense-item">
        <span class="exp-who" style="background:${getColor(ci)}">${e.payer}</span>
        <span class="exp-desc">${e.desc}</span>
        <span class="exp-amt">${fmt(e.amt)}</span>
        <button class="exp-del" onclick="removeExpense(${e.id})">🗑</button>
      </div>`;
    }).join('');
  }

  // ── RESULT ──
  function renderResult() {
    const el = document.getElementById('resultArea');
    if (!members.length || !expenses.length) {
      el.innerHTML = '<div class="empty"><div class="emoji">💸</div><p>멤버와 지출을 입력하면<br>정산 결과가 여기에 나타나요</p></div>';
      return;
    }

    const total = expenses.reduce((s,e) => s + e.amt, 0);
    const perPerson = Math.round(total / members.length);

    // paid map
    const paid = {};
    members.forEach(m => paid[m] = 0);
    expenses.forEach(e => paid[e.payer] = (paid[e.payer] || 0) + e.amt);

    // balance: positive = 받아야 할 돈, negative = 내야 할 돈
    const balance = {};
    members.forEach(m => balance[m] = paid[m] - perPerson);

    // transfers (greedy)
    const transfers = calcTransfers(balance);

    // 그룹명
    const gName = document.getElementById('groupName').value.trim() || '이번 모임';

    // ── 렌더 ──
    let html = '';

    // 요약
    html += `<div class="card">
      <div class="card-title">📋 ${gName} 정산 요약</div>
      <div class="result-summary">
        <div class="stat-box"><div class="stat-label">총 지출</div><div class="stat-val">${fmt(total)}</div></div>
        <div class="stat-box"><div class="stat-label">1인당</div><div class="stat-val">${fmt(perPerson)}</div></div>
        <div class="stat-box"><div class="stat-label">인원</div><div class="stat-val">${members.length}명</div></div>
        <div class="stat-box"><div class="stat-label">지출 건수</div><div class="stat-val">${expenses.length}건</div></div>
      </div>
    </div>`;

    // 개인별 현황
    html += `<div class="card"><div class="card-title">👤 개인별 현황</div>`;
    const maxPaid = Math.max(...members.map(m => paid[m]));
    members.forEach((m,i) => {
      const b = balance[m];
      const cls = b > 0 ? 'balance-pos' : b < 0 ? 'balance-neg' : 'balance-zero';
      const label = b > 0 ? `+${fmt(b)} 받을 돈` : b < 0 ? `${fmt(Math.abs(b))} 낼 돈` : '딱 맞음 ✓';
      html += `<div class="person-result">
        <div class="person-avatar" style="background:${getColor(i)}22;color:${getColor(i)}">${m[0]}</div>
        <div class="person-info">
          <div class="person-name">${m}</div>
          <div class="person-paid">결제 ${fmt(paid[m])}</div>
        </div>
        <div class="person-balance ${cls}">${label}</div>
      </div>`;
    });
    html += `</div>`;

    // 지출 비율 바 차트
    html += `<div class="card"><div class="card-title">📊 지출 비율</div>`;
    members.forEach((m,i) => {
      const pct = total > 0 ? Math.round(paid[m] / total * 100) : 0;
      html += `<div class="bar-row">
        <div class="bar-label">${m}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${getColor(i)};min-width:${paid[m]>0?'2px':'0'}">${pct > 10 ? pct+'%' : ''}</div>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:.78rem;color:var(--muted);width:36px;text-align:right">${pct}%</div>
      </div>`;
    });
    html += `</div>`;

    // 송금 안내
    html += `<div class="card"><div class="card-title">💸 송금 안내</div>`;
    if (!transfers.length) {
      html += `<div class="empty" style="padding:20px"><div class="emoji">🎉</div><p>모두 딱 맞게 냈어요!</p></div>`;
    } else {
      transfers.forEach(t => {
        html += `<div class="transfer-item">
          <span class="t-from">${t.from}</span>
          <span class="arrow">→</span>
          <span class="t-to">${t.to}</span>
          <span class="t-amt">${fmt(t.amt)}</span>
        </div>`;
      });
    }
    html += `</div>`;

    // 리셋
    html += `<button class="btn btn-secondary" onclick="resetAll()">🔄 처음부터 다시</button>`;

    el.innerHTML = html;
  }

  function calcTransfers(balance) {
    const creditors = [], debtors = [];
    Object.entries(balance).forEach(([name, val]) => {
      if (val > 0) creditors.push({ name, amt: val });
      else if (val < 0) debtors.push({ name, amt: -val });
    });
    creditors.sort((a,b) => b.amt - a.amt);
    debtors.sort((a,b) => b.amt - a.amt);

    const result = [];
    let i = 0, j = 0;
    while (i < creditors.length && j < debtors.length) {
      const send = Math.min(creditors[i].amt, debtors[j].amt);
      if (send >= 1) {
        result.push({ from: debtors[j].name, to: creditors[i].name, amt: send });
      }
      creditors[i].amt -= send;
      debtors[j].amt -= send;
      if (creditors[i].amt < 1) i++;
      if (debtors[j].amt < 1) j++;
    }
    return result;
  }

  function resetAll() {
    if (!confirm('모든 데이터를 초기화할까요?')) return;
    members = []; expenses = [];
    document.getElementById('groupName').value = '';
    document.getElementById('memberInput').value = '';
    renderMembers(); renderPayerSelect(); renderExpenses();
    goTab(0);
    toast('초기화 완료!');
  }

  // init
  renderMembers();
</script>
</body>
